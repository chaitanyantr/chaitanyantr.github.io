<!DOCTYPE html>
<!--
  Helper template for rendering favicons / apple-touch-icon.
  Open at exact size (CHROME --window-size=N,N) to capture a square PNG.
-->
<html><head><meta name="robots" content="noindex, nofollow"><style>
  html, body { margin:0; padding:0; width:100%; height:100%; background:#1772d0; }
  .wrap {
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    box-sizing:border-box; padding:14%;
  }
  img { width:100%; height:100%; image-rendering:pixelated; display:block; background:#fff; padding:6%; box-sizing:border-box; border-radius:14%; }
</style></head><body>
  <div class="wrap"><img src="img/tag16h5-11.svg" alt=""></div>
</body></html>
